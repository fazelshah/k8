name: newrelic Deployment

on:
  workflow_dispatch:
    inputs:
      eksClusterName:
        description: "EKS Cluster Name"
        required: true
        type: choice
        options:
        - k8-cluster
      awsRegion: 
        description: "AWS Region"
        required: true
        type: choice
        options:
        - ap-south-1

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_EKS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_EKS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.awsRegion }}

      - name: Setup Kubeconfig for Amazon EKS Cluster
        run: aws eks update-kubeconfig --name ${{ github.event.inputs.eksClusterName }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.19.2" # default is latest stable

      - name: Deploy Helm chart
        run: |
          helm repo add newrelic https://helm-charts.newrelic.com
          helm repo update
          helm upgrade --install newrelic-bundle newrelic/nri-bundle \
           --namespace newrelic \
           --create-namespace \
           --set global.licenseKey=${NEW_RELIC_LICENSE_KEY} \
           --set global.cluster=${EKS_CLUSTER_NAME} \
           --set global.endpoint=https://infra-api.eu.newrelic.com \
           --set newrelic-infrastructure.enabled=false \
           --set kube-state-metrics.enabled=true \
           --set prometheus.enabled=true \
           --set prometheus.config.enabled=true \
           --set logging.enabled=false \
           --set prometheus.config.scrape_configs[0].job_name=kubelet \
           --set prometheus.config.scrape_configs[0].kubernetes_sd_configs[0].role=node \
           --set prometheus.config.scrape_configs[0].scheme=https \
           --set prometheus.config.scrape_configs[0].tls_config.insecure_skip_verify=true \
           --set prometheus.config.scrape_configs[0].metrics_path=/metrics/cadvisor \
           --set prometheus.config.scrape_configs[0].metric_relabel_configs[0].source_labels[0]=__name__ \
           --set prometheus.config.scrape_configs[0].metric_relabel_configs[0].regex="container_cpu_usage_seconds_total|container_memory_working_set_bytes|kube_pod_.*" \
           --set prometheus.config.scrape_configs[0].metric_relabel_configs[0].action=keep
