name: newrelic Deployment

on:
  workflow_dispatch:
    inputs:
      eksClusterName:
        description: "EKS Cluster Name"
        required: true
        type: choice
        options:
        - k8-cluster
      awsRegion: 
        description: "AWS Region"
        required: true
        type: choice
        options:
        - ap-south-1

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_EKS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_EKS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.event.inputs.awsRegion }}

      - name: Setup Kubeconfig for Amazon EKS Cluster
        run: aws eks update-kubeconfig --name ${{ github.event.inputs.eksClusterName }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.19.2" # default is latest stable

      - name: Deploy Helm chart
        run: |
          helm repo add newrelic https://helm-charts.newrelic.com
          helm repo update
          helm upgrade --install newrelic-bundle newrelic/nri-bundle \
           --namespace newrelic \
           --create-namespace \
           --set global.licenseKey=${{ secrets.NEW_RELIC_LICENSE_KEY }} \
           --set global.cluster=${{ github.event.inputs.eksClusterName }} \
           --set newrelic-infrastructure.enabled=true \
           --set newrelic-infrastructure.lowDataMode=true \
           --set kube-state-metrics.enabled=false \
           --set nri-kubernetes.ksm.enabled=false \
           --set nri-kubernetes.ksm.collect=false \
           --set nri-kubernetes.deployments.ksm.enabled=false \
           --set prometheus.enabled=false \
           --set logging.enabled=false \
           --set nri-kubernetes.enabled=true \
           --set nri-kubernetes.lowDataMode=true \
           --set nri-kubernetes.kubelet.enabled=true \
           --set nri-kubernetes.kubelet.insecureSkipVerify=true 
           
