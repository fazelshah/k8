

ingress:
  enabled: false

service:
  type: LoadBalancer
  port: 443
  targetPort: 3000

  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"

    # TLS using ACM (same cert you used in ALB)
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: arn:aws:acm:ap-south-1:330101109473:certificate/27ce8fb1-c67a-4cda-8e8f-98980e0b178c
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"

  hosts:
    - grafana.fazelshah.fun

  path: /
  pathType: Prefix
