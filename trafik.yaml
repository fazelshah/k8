deployment:
  replicas: 1

service:
  enabled: true
  type: LoadBalancer
  externalTrafficPolicy: Local

  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"

providers:
  kubernetesIngress:
    enabled: true

  kubernetesCRD:
    enabled: true

ports:
  web:
    port: 80
    expose:
      default: true
    exposedPort: 80

  websecure:
    port: 443
    expose:
      default: true
    exposedPort: 443

ingressRoute:
  dashboard:
    enabled: false
