

# Keep infra agent but reduce noise
newrelic-infrastructure:
  enabled: true
  lowDataMode: true
  config:
    enable_process_metrics: false

# Core Kubernetes integration (ONLY what we need)
nri-kubernetes:
  enabled: true
  lowDataMode: true

  kubelet:
    enabled: true
    insecureSkipVerify: true

  # 🔥 Limit to only required metrics
  metrics:
    enabled: true
    include:
      - k8s.container.cpuCoresUtilization
      - k8s.container.memoryWorkingSetUtilization

# Disable everything else (cost heavy)
kube-state-metrics:
  enabled: false

ksm:
  enabled: false

controlPlane:
  enabled: false

prometheus:
  enabled: false

logging:
  enabled: false

# Reduce scrape frequency (less data = less cost)
common:
  config:
    interval: 30s

lowDataMode: true