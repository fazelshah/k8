# Keep infra agent but reduce noise
newrelic-infrastructure:
  enabled: true
  lowDataMode: true
  config:
    enable_process_metrics: false

  common:
    config:
      namespaceSelector:
        matchExpressions:
          - key: kubernetes.io/metadata.name
            operator: In
            values:
              - monitoring

# Core Kubernetes integration (ONLY what we need)
nri-kubernetes:
  enabled: true
  lowDataMode: true

  kubelet:
    enabled: true
    insecureSkipVerify: true

  metrics:
    enabled: true
    

# ✅ ENABLE THIS (fix)
kube-state-metrics:
  enabled: true

# ❌ keep rest disabled
ksm:
  enabled: true
controlPlane:
  enabled: false
prometheus:
  enabled: false
logging:
  enabled: false

common:
  config:
    interval: 30s

lowDataMode: true
